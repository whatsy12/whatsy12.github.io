<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Adaptive Pop Quiz</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    #quiz-container {
      background: white;
      padding: 2rem;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 400px;
      max-width: 90%;
    }

    .option {
      display: block;
      margin: 0.5rem 0;
      padding: 0.5rem;
      background: #e0e7ff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .option:hover {
      background: #c7d2fe;
    }

    .correct {
      background-color: #a7f3d0 !important;
    }

    .incorrect {
      background-color: #fecaca !important;
    }

    #feedback {
      margin-top: 10px;
      font-weight: bold;
    }

    #next-btn {
      margin-top: 15px;
      display: none;
      padding: 0.5rem 1rem;
      background-color: #6366f1;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    #next-btn:hover {
      background-color: #4f46e5;
    }

    #score {
      margin-top: 1rem;
      font-weight: bold;
    }

    #level {
      margin-top: 0.5rem;
      font-style: italic;
      color: #666;
    }
  </style>
</head>
<body>

  <div id="quiz-container">
    <h2 id="question">Loading...</h2>
    <div id="options"></div>
    <div id="feedback"></div>
    <button id="next-btn">Next</button>
    <div id="score"></div>
    <div id="level"></div>
  </div>

  <script>
    const questions = {
      1: [
        {
          question: "What is the correct way to get user input in Python?",
          options: ["input()", "read()", "get()", "scanf()"],
          answer: "input()"
        },
        {
          question: "Which line prints a variable `name`?",
          options: ["print name", "echo(name)", "print(name)", "printf(name)"],
          answer: "print(name)"
        },
        {
          question: "What is the output of:\n\nprint(\"Hello\" + \"World\")",
          options: ["HelloWorld", "Hello World", "Hello+World", "Error"],
          answer: "HelloWorld"
        }
      ],
      2: [
        {
          question: "What is the output of:\n\nlen([1, 2, 3])",
          options: ["2", "3", "4", "Error"],
          answer: "3"
        },
        {
          question: "Which function adds an item to a list?",
          options: ["push()", "add()", "append()", "insert()"],
          answer: "append()"
        },
        {
          question: "How do you access the first item in a list `nums = [10, 20, 30]`?",
          options: ["nums[0]", "nums(0)", "nums{1}", "nums[1]"],
          answer: "nums[0]"
        }
      ],
      3: [
        {
          question: "What is the output of:\n\nprint(bool([]))",
          options: ["True", "False", "None", "Error"],
          answer: "False"
        },
        {
          question: "What will this output?\n\nx = [1, 2, 3]\nprint(x * 2)",
          options: ["[2, 4, 6]", "[1, 2, 3, 1, 2, 3]", "[2, 2, 2]", "Error"],
          answer: "[1, 2, 3, 1, 2, 3]"
        },
        {
          question: "What happens if you use `list.remove(5)` when 5 is not in the list?",
          options: ["Does nothing", "Removes the last item", "Raises an error", "Returns None"],
          answer: "Raises an error"
        }
      ],
      4: [
        {
          question: "What does this function do?\n\ndef count_up(n):\n    for i in range(1, n+1):\n        print(i)",
          options: ["Prints 1 to n", "Prints 0 to n", "Prints n times", "Error"],
          answer: "Prints 1 to n"
        },
        {
          question: "How many times will this loop run?\n\nfor i in range(2, 10, 2):\n    print(i)",
          options: ["4", "5", "6", "8"],
          answer: "4"
        },
        {
          question: "What is the output?\n\ndef repeat(word):\n    return word * 2\n\nprint(repeat('hi'))",
          options: ["hi", "hihi", "hi hi", "Error"],
          answer: "hihi"
        }
      ]
    };

    let score = 0;
    let difficulty = 2; // Start at medium
    let currentQuestion = null;

    const questionEl = document.getElementById('question');
    const optionsEl = document.getElementById('options');
    const feedbackEl = document.getElementById('feedback');
    const nextBtn = document.getElementById('next-btn');
    const scoreEl = document.getElementById('score');
    const levelEl = document.getElementById('level');

    function getRandomQuestion(level) {
      const pool = questions[level];
      return pool[Math.floor(Math.random() * pool.length)];
    }

    function loadQuestion() {
      currentQuestion = getRandomQuestion(difficulty);
      questionEl.textContent = currentQuestion.question;
      optionsEl.innerHTML = '';
      feedbackEl.textContent = '';
      nextBtn.style.display = 'none';
      scoreEl.textContent = `Score: ${score}`;
      levelEl.textContent = `Difficulty Level: ${difficulty}`;

      currentQuestion.options.forEach(option => {
        const btn = document.createElement('button');
        btn.textContent = option;
        btn.className = 'option';
        btn.onclick = () => selectAnswer(btn, option);
        optionsEl.appendChild(btn);
      });
    }

    function selectAnswer(button, selected) {
      const correct = currentQuestion.answer;
      const allButtons = document.querySelectorAll('.option');

      allButtons.forEach(btn => btn.disabled = true);

      if (selected === correct) {
        button.classList.add('correct');
        feedbackEl.textContent = "✅ Correct!";
        score++;
        if (difficulty < 4) difficulty++; // move up
      } else {
        button.classList.add('incorrect');
        feedbackEl.textContent = `❌ Incorrect. Correct answer: ${correct}`;
        if (difficulty > 1) difficulty--; // move down
      }

      nextBtn.style.display = 'inline-block';
    }

    nextBtn.onclick = () => {
      loadQuestion();
    };

    loadQuestion();
  </script>
</body>
</html>
