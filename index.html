<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Adaptive Pop Quiz</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    #quiz-container {
      background: white;
      padding: 2rem;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 400px;
      max-width: 90%;
    }

    .option {
      display: block;
      margin: 0.5rem 0;
      padding: 0.5rem;
      background: #e0e7ff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .option:hover {
      background: #c7d2fe;
    }

    .correct {
      background-color: #a7f3d0 !important;
    }

    .incorrect {
      background-color: #fecaca !important;
    }

    #feedback {
      margin-top: 10px;
      font-weight: bold;
    }

    #next-btn {
      margin-top: 15px;
      display: none;
      padding: 0.5rem 1rem;
      background-color: #6366f1;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    #next-btn:hover {
      background-color: #4f46e5;
    }

    #score {
      margin-top: 1rem;
      font-weight: bold;
    }

    #level {
      margin-top: 0.5rem;
      font-style: italic;
      color: #666;
    }
  </style>

     crossorigin="anonymous"></script>

      feedbackEl.textContent = '';
      nextBtn.style.display = 'none';
      scoreEl.textContent = `Score: ${score}`;
      levelEl.textContent = `Difficulty Level: ${difficulty}`;

      currentQuestion.options.forEach(option => {
        const btn = document.createElement('button');
        btn.textContent = option;
        btn.className = 'option';
        btn.onclick = () => selectAnswer(btn, option);
        optionsEl.appendChild(btn);
      });
    }

    function selectAnswer(button, selected) {
      const correct = currentQuestion.answer;
      const allButtons = document.querySelectorAll('.option');

      allButtons.forEach(btn => btn.disabled = true);

      if (selected === correct) {
        button.classList.add('correct');
        feedbackEl.textContent = "✅ Correct!";
        score++;
        if (difficulty < 4) difficulty++; // move up
      } else {
        button.classList.add('incorrect');
        feedbackEl.textContent = `❌ Incorrect. Correct answer: ${correct}`;
        if (difficulty > 1) difficulty--; // move down
      }

      nextBtn.style.display = 'inline-block';
    }

    nextBtn.onclick = () => {
      loadQuestion();
    };

    loadQuestion();
  </script>
</body>
</html>
