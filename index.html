<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Adaptive Pop Quiz</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    #quiz-container {
      background: white;
      padding: 2rem;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 400px;
      max-width: 90%;
    }

    .option {
      display: block;
      margin: 0.5rem 0;
      padding: 0.5rem;
      background: #e0e7ff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .option:hover {
      background: #c7d2fe;
    }

    .correct {
      background-color: #a7f3d0 !important;
    }

    .incorrect {
      background-color: #fecaca !important;
    }

    #feedback {
      margin-top: 10px;
      font-weight: bold;
    }

    #next-btn {
      margin-top: 15px;
      display: none;
      padding: 0.5rem 1rem;
      background-color: #6366f1;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    #next-btn:hover {
      background-color: #4f46e5;
    }

    #score {
      margin-top: 1rem;
      font-weight: bold;
    }

    #level {
      margin-top: 0.5rem;
      font-style: italic;
      color: #666;
    }
  </style>
</head>
<body>

  <div id="quiz-container">
    <h2 id="question">Loading...</h2>
    <div id="options"></div>
    <div id="feedback"></div>
    <button id="next-btn">Next</button>
    <div id="score"></div>
    <div id="level"></div>
  </div>

  <script>
    const questions = {
      1: [
        { question: "What is 1 + 1?", options: ["1", "2", "3", "4"], answer: "2" },
        { question: "What color is the sky?", options: ["Green", "Blue", "Red", "Yellow"], answer: "Blue" },
      ],
      2: [
        { question: "Which planet is known as the Red Planet?", options: ["Earth", "Mars", "Venus", "Jupiter"], answer: "Mars" },
        { question: "What is the capital of France?", options: ["Berlin", "Madrid", "Paris", "Lisbon"], answer: "Paris" },
      ],
      3: [
        { question: "Who developed the theory of relativity?", options: ["Newton", "Einstein", "Tesla", "Hawking"], answer: "Einstein" },
        { question: "What is the square root of 144?", options: ["10", "11", "12", "13"], answer: "12" },
      ],
      4: [
        { question: "What is the derivative of sin(x)?", options: ["cos(x)", "-cos(x)", "-sin(x)", "tan(x)"], answer: "cos(x)" },
        { question: "Which element has the atomic number 82?", options: ["Gold", "Lead", "Iron", "Zinc"], answer: "Lead" },
      ]
    };

    let score = 0;
    let difficulty = 2; // Start at medium
    let currentQuestion = null;

    const questionEl = document.getElementById('question');
    const optionsEl = document.getElementById('options');
    const feedbackEl = document.getElementById('feedback');
    const nextBtn = document.getElementById('next-btn');
    const scoreEl = document.getElementById('score');
    const levelEl = document.getElementById('level');

    function getRandomQuestion(level) {
      const pool = questions[level];
      return pool[Math.floor(Math.random() * pool.length)];
    }

    function loadQuestion() {
      currentQuestion = getRandomQuestion(difficulty);
      questionEl.textContent = currentQuestion.question;
      optionsEl.innerHTML = '';
      feedbackEl.textContent = '';
      nextBtn.style.display = 'none';
      scoreEl.textContent = `Score: ${score}`;
      levelEl.textContent = `Difficulty Level: ${difficulty}`;

      currentQuestion.options.forEach(option => {
        const btn = document.createElement('button');
        btn.textContent = option;
        btn.className = 'option';
        btn.onclick = () => selectAnswer(btn, option);
        optionsEl.appendChild(btn);
      });
    }

    function selectAnswer(button, selected) {
      const correct = currentQuestion.answer;
      const allButtons = document.querySelectorAll('.option');

      allButtons.forEach(btn => btn.disabled = true);

      if (selected === correct) {
        button.classList.add('correct');
        feedbackEl.textContent = "✅ Correct!";
        score++;
        if (difficulty < 4) difficulty++; // move up
      } else {
        button.classList.add('incorrect');
        feedbackEl.textContent = `❌ Incorrect. Correct answer: ${correct}`;
        if (difficulty > 1) difficulty--; // move down
      }

      nextBtn.style.display = 'inline-block';
    }

    nextBtn.onclick = () => {
      loadQuestion();
    };

    loadQuestion();
  </script>
</body>
</html>
